<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalüna - Centro de Pilates</title>
  <link rel="stylesheet" href="/css/app.css">
  <style>
    .landing { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 2rem; }
    .landing-logo { width: 90px; height: 90px; background: var(--primary); color: white; font-size: 2.5rem; font-weight: 700; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .landing h1 { color: var(--primary-dark); font-size: 2.2rem; margin: 0; }
    .landing p { color: var(--text-light); margin: -.5rem 0 1rem; }
    .landing-cards { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .landing-card { background: var(--card); border-radius: 20px; padding: 2.5rem 2rem; box-shadow: var(--shadow); text-align: center; width: 260px; cursor: pointer; transition: all .2s; border: 3px solid transparent; text-decoration: none; color: var(--text); }
    .landing-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(124,111,156,.2); border-color: var(--primary); }
    .landing-card .card-icon { font-size: 3rem; margin-bottom: 1rem; }
    .landing-card h2 { font-size: 1.3rem; color: var(--primary-dark); margin: 0 0 .5rem; }
    .landing-card p { font-size: .9rem; color: var(--text-light); margin: 0; }
  </style>
</head>
<body class="login-page">
  <div class="landing">
    <div class="landing-logo">K</div>
    <h1>Kalüna</h1>
    <p>Centro de Pilates</p>
    <div class="landing-cards">
      <a href="/login" class="landing-card">
        <div class="card-icon">📊</div>
        <h2>Dashboard</h2>
        <p>Panel de control del centro</p>
      </a>
      <a href="/fichaje" class="landing-card">
        <div class="card-icon">🕐</div>
        <h2>Fichaje</h2>
        <p>Registrar entrada y salida</p>
      </a>
    </div>
  </div>
</body>
</html>
