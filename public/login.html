<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalüna - Dashboard</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-logo">K</div>
    <h1>Kalüna</h1>
    <p class="login-subtitle">Centro de Pilates</p>

    <div id="login-tabs" class="login-tabs">
      <button class="tab-btn active" data-tab="admin">Admin</button>
      <button class="tab-btn" data-tab="trabajadora">Trabajadora</button>
    </div>

    <form id="form-admin" class="login-form">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Contraseña" required>
      <button type="submit">Entrar</button>
    </form>

    <form id="form-trabajadora" class="login-form" style="display:none">
      <input type="text" id="pin" placeholder="PIN (4 dígitos)" maxlength="6" required>
      <button type="submit">Entrar</button>
    </form>

    <div id="login-error" class="error" style="display:none"></div>
    <a href="/" style="display:block;text-align:center;margin-top:1rem;color:var(--text-light);font-size:.85rem">Volver al inicio</a>
  </div>
  <script src="/js/login.js"></script>
</body>
</html>
